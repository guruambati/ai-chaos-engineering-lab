name: AI Chaos Engineering CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"
jobs:
  chaos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --asyncio-mode=auto --cov=src --cov-report=term-missing --cov-report=xml --tb=short --cov=src --cov-report=term-missing --cov-report=xml
      - run: python chaos.py --scenario full --reps 2
